
services:
  # ---------------------------------------------------------------------
  # PostgreSQL - persistent relational store for the 4-tier report schema
  # ---------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-pentest_reporting}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - pentest_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-pentest_reporting}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - pentest_net

  # ---------------------------------------------------------------------
  # Django REST backend (gunicorn) - waits on Postgres healthcheck before
  # entrypoint.sh runs migrate/collectstatic/seed and starts serving.
  # ---------------------------------------------------------------------
  backend:
    build:
      context: ./pentest_reporting
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?set DJANGO_SECRET_KEY in .env}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-backend,localhost,127.0.0.1}
      DJANGO_COOKIE_SECURE: ${DJANGO_COOKIE_SECURE:-true}
      DB_NAME: ${DB_NAME:-pentest_reporting}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      DB_HOST: db
      DB_PORT: 5432
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
    volumes:
      - pentest_media:/app/media
      - pentest_static:/app/staticfiles
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - pentest_net

  # ---------------------------------------------------------------------
  # React SPA, built and served by nginx, proxying /api (and cookies)
  # through to the backend so the browser sees everything same-origin.
  # ---------------------------------------------------------------------
  frontend:
    build:
      context: ./pentest_reporting_frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      # Mount the shared media volume read-only so Nginx can serve
      # uploaded PoC images directly under /media/ without proxying
      # through the backend container.
      - pentest_media:/usr/share/nginx/html/media:ro
    networks:
      - pentest_net

networks:
  pentest_net:
    driver: bridge

volumes:
  pentest_db_data:
  pentest_media:
  pentest_static:
  
